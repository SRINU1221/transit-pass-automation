    <script type="text/javascript">

        function changePwd() {



            if (!isblank(document.getElementById("txtforgetNewPassword").value, 'New Password')) return false;
            if (!isAtleastOnedigit(document.getElementById("txtforgetNewPassword").value, 'New Password')) return false;
            if (!isPassword(document.getElementById("txtforgetNewPassword").value, 'New Password')) return false;

            if (!isblank(document.getElementById("txtforgetConfirmPassword").value, 'Re-enter New Password')) return false;
            if (!isAtleastOnedigit(document.getElementById("txtforgetConfirmPassword").value, 'Re-enter New Password')) return false;
            if (!isPassword(document.getElementById("txtforgetConfirmPassword").value, 'Re-enter New Password')) return false;



            if ((document.getElementById("txtforgetNewPassword").value.length < 8) && (document.getElementById("txtforgetConfirmPassword").value.length < 8)) {
                alert("Password should have a minimum prescribed number of characters \n and values.!");
                return false;
            }
            if (!isAtleastOnedigit(document.getElementById("txtforgetNewPassword").value)) return false;

            if (document.getElementById("txtforgetNewPassword").value != document.getElementById("txtforgetConfirmPassword").value) {
                alert('Passwords are not matching. Kindly Recheck!')
                return (false);
            }
            
        }
    </script>

    <script type="text/javascript">
        jQuery(document).ready(function ($) {


            var $only_once = '';


            if (!$only_once) {
                $('.modalbox-container').removeClass('hide');
                $('html,body').css('overflow', 'hidden');
                $('.modalbox-banner').focus();
            } else {
                if ($s3waas_modal_cookie == null) {
                    $('.modalbox-container').removeClass('hide');
                    $('html,body').css('overflow', 'hidden');
                    $('.modalbox-banner').focus();
                }
            }

            $("#s3wassModalpopupClose").click(function () {
                if ($only_once) {
                    let nonce = $(this).attr('data-nonce');
                    $.post(ajaxurl, { nonce: nonce, action: 's3waas_modal_cookie' }, function () { return true });
                }
                $(".modalbox-container").hide();
                $('.skip-to-content').focus();
                $('html,body').css('overflow', '');
            });
            $(document).keyup(function (e) {
                if (e.key === "Escape") { // escape key maps to keycode `27`
                    if ($(".modalbox-container").length > 0) {
                        $("#s3wassModalpopupClose").trigger('click');
                    }
                }
            });
        })
    </script>
